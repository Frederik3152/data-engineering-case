bundle:
  name: clinical-trials-pipeline

workspace:
  profile: DEFAULT

resources:
  jobs:
    ingest_bronze:
      name: "clinical_trials_bronze"
      schedule:
        quartz_cron_expression: "0 0 15 ? * MON-FRI" # Every weekday at 3 PM UTC (matches https://clinicaltrials.gov/data-api/api#extapi)                                                                                                                                                                                                                                         
        timezone_id: "UTC"                                                                                                                                                                                                                                                                   
        pause_status: "UNPAUSED" 
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ./notebooks/01_ingest_bronze.py

    transform_silver:
      name: "clinical_trials_silver"
      trigger:
        pause_status: "UNPAUSED"
        table_update:
          table_names:
            - data_engineering_case.bronze.clinical_trials
          condition: ALL_UPDATED
          wait_after_last_change_seconds: 60
      tasks:
        - task_key: transform
          notebook_task:
            notebook_path: ./notebooks/02_transform_silver.py

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
